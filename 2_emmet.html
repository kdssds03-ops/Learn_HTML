<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 자식 노드 자동완성, > 사용-->
    <div>
      <ul>
        <li></li>
      </ul>
    </div>
    <!-- 형제 노드 자동완성, + 사용-->
    <div>
      <ul></ul>
      <ol></ol>
      <div></div>
    </div>
    <!-- 특정 노드 반복완성, * 사용-->
    <div>
      <ul>
        <li></li>
        <li></li>
        <li></li>
      </ul>
    </div>

    <!-- 아이디 # 사용 span#item-->

    <span id="item"></span>
    <div id="item"></div>

    <!-- 클래스 . 사용 span.title-->

    <span class="title"></span>
    <div class="title"></div>

    <!--콘텐츠 {} p.container{Hello World~!}-->

    <p class="container">Hello World~!</p>

    <!-- 자동 넘버링 $ p.container{item$}*5-->

    <p class="container">item1</p>
    <p class="container">item2</p>
    <p class="container">item3</p>
    <p class="container">item4</p>
    <p class="container">item5</p>
  </body>
</html>
