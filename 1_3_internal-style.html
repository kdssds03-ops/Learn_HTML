<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internal Style</title>
  <style>
    /* 내부스타일 */
    h1 {
      color: blue;
    }
    p {
      color: red;
    }
    .content {
      border:2px solid red;
      padding: 20px;
      background-color: yellow;
    }
  </style>
</head>
<body>
  <h1>헬스</h1>
  <p class="content">헬스는 건강을 위해서 하는 운동입니다.</p>
</body>
</html>
